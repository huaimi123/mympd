name: Release MPD Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag to publish assets to, e.g. v1.0.0"
        required: true
        default: "v1.0.0"
      publish_release:
        description: "Publish built artifacts to the GitHub Release after the workflow finishes"
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux-x86_64-glibc:
    name: Build linux-x86_64-glibc
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify build script revision
        shell: bash
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          grep -n -- "-Dicu=disabled" scripts/build-native-plugin-binaries-common.sh
          sed -n '342,370p' scripts/build-native-plugin-binaries-common.sh

      - name: Build bundle
        run: |
          chmod +x scripts/build-linux-x86_64-glibc.sh
          chmod +x scripts/build-native-plugin-binaries-common.sh
          ./scripts/build-linux-x86_64-glibc.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpd-player-linux-x86_64-glibc
          path: dist/plugin-binaries/mpd-player-linux-x86_64-glibc.tgz
          if-no-files-found: error

  build-linux-x86_64-musl:
    name: Build linux-x86_64-musl
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Alpine base tools
        shell: sh
        run: |
          apk add --no-cache bash git

      - name: Verify build script revision
        shell: sh
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          grep -n -- "-Dicu=disabled" scripts/build-native-plugin-binaries-common.sh
          sed -n '342,370p' scripts/build-native-plugin-binaries-common.sh

      - name: Build bundle
        shell: sh
        run: |
          chmod +x scripts/build-linux-x86_64-musl.sh
          chmod +x scripts/build-native-plugin-binaries-common.sh
          bash ./scripts/build-linux-x86_64-musl.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpd-player-linux-x86_64-musl
          path: dist/plugin-binaries/mpd-player-linux-x86_64-musl.tgz
          if-no-files-found: error

  build-linux-arm64-glibc:
    name: Build linux-arm64-glibc
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundle
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          env: |
            IGNORE_HOST_CHECK: 1
          install: |
            apt-get update
            apt-get install -y bash curl git
          run: |
            chmod +x scripts/build-linux-arm64-glibc.sh
            chmod +x scripts/build-native-plugin-binaries-common.sh
            ./scripts/build-linux-arm64-glibc.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpd-player-linux-arm64-glibc
          path: dist/plugin-binaries/mpd-player-linux-arm64-glibc.tgz
          if-no-files-found: error

  build-linux-arm64-musl:
    name: Build linux-arm64-musl
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundle
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: alpine_latest
          githubToken: ${{ github.token }}
          env: |
            IGNORE_HOST_CHECK: 1
          install: |
            apk add --no-cache bash curl git
          run: |
            chmod +x scripts/build-linux-arm64-musl.sh
            chmod +x scripts/build-native-plugin-binaries-common.sh
            bash ./scripts/build-linux-arm64-musl.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpd-player-linux-arm64-musl
          path: dist/plugin-binaries/mpd-player-linux-arm64-musl.tgz
          if-no-files-found: error

  build-linux-armv7-glibc:
    name: Build linux-armv7-glibc
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundle
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          env: |
            IGNORE_HOST_CHECK: 1
          install: |
            apt-get update
            apt-get install -y bash curl git
          run: |
            chmod +x scripts/build-linux-armv7-glibc.sh
            chmod +x scripts/build-native-plugin-binaries-common.sh
            ./scripts/build-linux-armv7-glibc.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpd-player-linux-armv7-glibc
          path: dist/plugin-binaries/mpd-player-linux-armv7-glibc.tgz
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    if: ${{ always() && (((github.event_name == 'push') && startsWith(github.ref, 'refs/tags/v')) || ((github.event_name == 'workflow_dispatch') && inputs.publish_release)) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    needs:
      - build-linux-x86_64-glibc
      - build-linux-x86_64-musl
      - build-linux-arm64-glibc
      - build-linux-arm64-musl
      - build-linux-armv7-glibc
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release tgz files
        shell: bash
        run: |
          mkdir -p release-files
          find release-artifacts -type f -name '*.tgz' -exec cp {} release-files/ \;
          echo "Collected files:"
          find release-files -maxdepth 1 -type f | sort
          test -n "$(find release-files -maxdepth 1 -type f -name '*.tgz' -print -quit)"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: release-files/*.tgz
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
